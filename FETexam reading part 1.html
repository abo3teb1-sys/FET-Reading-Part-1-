<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FET Reading Part 1: Trap Mastery</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #ece9e6, #ffffff);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); font-size: 2.2em; margin-bottom: 10px; }
        .sub-header { text-align: center; color: #666; margin-bottom: 30px; font-style: italic; }

        .trap-legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #f1f4f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 5px solid var(--primary);
        }

        .trap-item { font-size: 0.85em; line-height: 1.4; }
        .trap-item b { color: var(--secondary); }

        .question-card {
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .sign-container {
            background: #fff;
            border: 4px solid #333;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.3em;
            margin-bottom: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 5px 5px 0px #ccc;
            text-transform: uppercase;
        }

        .options label {
            display: block;
            padding: 15px;
            margin: 10px 0;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options label:hover { background: #f0f7ff; border-color: var(--accent); }
        input[type="radio"] { margin-right: 15px; transform: scale(1.2); }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .btn-submit:hover { background: #0d1a4d; }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95em;
            background: #fffbe6;
            border: 1px solid #ffe58f;
        }

        .correct-ans { border: 2px solid var(--success) !important; background: #eafff1 !important; }
        .wrong-ans { border: 2px solid var(--danger) !important; background: #fff1f0 !important; }
        
        #result-display {
            text-align: center;
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .tech-badge {
            background: var(--secondary);
            color: white;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FET Reading: Part 1</h1>
    <p class="sub-header">Cambridge Format - Sign & Notice Practice</p>
    
    <div class="trap-legend">
        <div class="trap-item"><b>Time Trip:</b> Right event, wrong order/time.</div>
        <div class="trap-item"><b>Exact Word Trip:</b> Same word, different meaning.</div>
        <div class="trap-item"><b>Reverse Trip:</b> Flips who does what (direction).</div>
        <div class="trap-item"><b>Made-up Trip:</b> Information not found in text.</div>
    </div>

    <div id="quiz-content">
        <div id="questions-wrapper"></div>
        <button type="button" class="btn-submit" onclick="gradeQuiz()">SUBMIT ANSWERS</button>
    </div>

    <div id="result-display"></div>
</div>

<script>
    const questionBank = [
        // TIME TRIPS
        {
            sign: "Train Station: Purchase tickets at the machine before boarding.",
            options: ["Buy your ticket after you get on the train.", "You must have a ticket to get on the train.", "The machine only accepts cash for tickets."],
            correct: 1,
            tech: "Time Trip",
            explain: "The sign says 'Before boarding'. Option A suggests 'After', which is a time trip."
        },
        {
            sign: "Lab: Wash hands after handling chemical samples.",
            options: ["Wash your hands before you touch chemicals.", "You should clean your hands once the work is finished.", "Chemicals should be washed with water."],
            correct: 1,
            tech: "Time Trip",
            explain: "The sign says 'After'. Option A says 'Before', reversing the required order."
        },
        // EXACT WORD TRIPS
        {
            sign: "Airport: Please present your boarding pass at the gate.",
            options: ["The gate is made of heavy metal.", "Show your document before entering the plane area.", "You can pass through the gate at any time."],
            correct: 1,
            tech: "Exact Word Trip",
            explain: "The word 'Pass' in the sign is a noun (document). Option C uses it as a verb (to move through)."
        },
        {
            sign: "Cinema: Please keep your mobile on silent during the show.",
            options: ["The show will be loud and mobile.", "Do not make noise with your phone during the movie.", "Mobiles are on sale during the show."],
            correct: 1,
            tech: "Exact Word Trip",
            explain: "The sign uses 'Show' as a noun (movie). Option A uses 'Mobile' to mean 'moving'."
        },
        // REVERSE TRIPS
        {
            sign: "Library: Hand your student ID to the librarian to borrow a laptop.",
            options: ["The librarian will give you an ID for the laptop.", "Librarians must show IDs to students.", "The student must give their ID to the staff member."],
            correct: 2,
            tech: "Reverse Trip",
            explain: "Direction: Student -> Librarian. Option A and B reverse the roles."
        },
        {
            sign: "Hospital: Visitors must report to the nurse on arrival.",
            options: ["The nurse will find the visitors when they arrive.", "Visitors need to tell the nurse they have arrived.", "The nurse reports to the visitors every hour."],
            correct: 1,
            tech: "Reverse Trip",
            explain: "Direction: Visitor -> Nurse. Option C suggests the Nurse reports to the Visitor."
        },
        // MADE-UP TRIPS
        {
            sign: "No Entry: Authorized Personnel Only.",
            options: ["Only specific staff can enter here.", "No entry because the floor is wet.", "You can enter if you are wearing a suit."],
            correct: 0,
            tech: "Made-up Trip",
            explain: "Options B and C add reasons (wet floor/wearing a suit) not mentioned in the text."
        },
        {
            sign: "Store: Buy 2 shirts and get 1 free.",
            options: ["If you buy three shirts, you only pay for two.", "Sale ends this Sunday at midnight.", "Free shirts are only available in blue."],
            correct: 0,
            tech: "Made-up Trip",
            explain: "Options B and C add time limits or color restrictions not found in the sign."
        }
    ];

    function setupQuiz() {
        // Shuffle and pick 7
        const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 7);
        
        const container = document.getElementById('questions-wrapper');
        container.innerHTML = '';

        selected.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-container-${index}`;
            card.innerHTML = `
                <div class="sign-container">${q.sign}</div>
                <div class="options">
                    ${q.options.map((opt, i) => `
                        <label>
                            <input type="radio" name="q${index}" value="${i}" data-correct="${q.correct}">
                            ${opt}
                        </label>
                    `).join('')}
                </div>
                <div class="explanation" id="explain-${index}">
                    <span class="tech-badge">TRAP TYPE: ${q.tech}</span><br>
                    <strong>Logic:</strong> ${q.explain}
                </div>
            `;
            container.appendChild(card);
            card.dataset.correctIndex = q.correct;
        });
    }

    function gradeQuiz() {
        let score = 0;
        const total = 7;
        const cards = document.querySelectorAll('.question-card');

        cards.forEach((card, index) => {
            const selected = card.querySelector(`input[name="q${index}"]:checked`);
            const correctIdx = card.dataset.correctIndex;
            const explanation = document.getElementById(`explain-${index}`);
            
            explanation.style.display = "block";

            if (selected) {
                if (selected.value == correctIdx) {
                    score++;
                    card.classList.add('correct-ans');
                } else {
                    card.classList.add('wrong-ans');
                }
            } else {
                card.classList.add('wrong-ans');
            }
        });

        const result = document.getElementById('result-display');
        result.style.display = "block";
        result.style.backgroundColor = score >= 5 ? "#eafff1" : "#fff1f0";
        result.innerHTML = `Your Score: ${score} / ${total}`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    setupQuiz();
</script>

</body>
</html>
